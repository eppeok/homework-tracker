<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%22 height=%2732%22 rx=%277%22 fill=%27%2306090f%27/%3E%3Crect x=%271%22 y=%271%22 width=%2230%22 height=%2230%22 rx=%226%22 fill=%27none%27 stroke=%27%231a2840%27 stroke-width=%271%27/%3E%3Ctext x=%2216%22 y=%2224%22 font-family=%27system-ui%27 font-size=%2721%22 font-weight=%27900%27 text-anchor=%27middle%27 fill=%27%233b82f6%27%3EE%3C/text%3E%3C/svg%3E"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Homework Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06090f;--card:#0c1220;--border:#1a2840;--text:#e2e8f0;--dim:#64748b;--sub:#94a3b8;--blue:#3b82f6;--green:#22c55e;--yellow:#f59e0b;--purple:#a78bfa;--red:#ef4444;--orange:#f97316}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) var(--delay,0s) infinite alternate}
@keyframes twinkle{from{opacity:.1}to{opacity:.6}}
nav{position:sticky;top:0;z-index:100;background:#06090fee;backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:10px;height:56px}
.nav-back{font-size:.8rem;font-weight:700;color:var(--dim);text-decoration:none;padding:5px 12px;border:1px solid var(--border);border-radius:20px;transition:color .2s}
.nav-back:hover{color:var(--text)}
.nav-title{font-size:1.1rem;font-weight:900;color:var(--green)}
.page{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:36px 20px}
h1{font-size:2rem;font-weight:900;margin-bottom:6px}
.sub{color:var(--sub);margin-bottom:28px}

/* Summary bar */
.summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
.sum-num{font-size:1.8rem;font-weight:900}
.sum-lbl{font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.sum-card.urgent .sum-num{color:var(--red)}
.sum-card.due .sum-num{color:var(--yellow)}
.sum-card.done .sum-num{color:var(--green)}
.sum-card.total .sum-num{color:var(--blue)}

/* Add form */
.add-form{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px;margin-bottom:24px}
.form-title{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.form-grid{grid-template-columns:1fr}}
.field label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--sub);display:block;margin-bottom:5px}
input[type=text],input[type=date],select,textarea{background:#111827;border:1px solid var(--border);color:#fff;border-radius:10px;padding:9px 12px;font-size:.88rem;width:100%;outline:none;font-family:inherit;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--green)}
select option{background:#111827}
.field.full{grid-column:1/-1}
.add-btn{margin-top:14px;width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--green),#16a34a);color:#000;font-size:1rem;font-weight:800;cursor:pointer;transition:all .2s}
.add-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}

/* Filter / view bar */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--sub);font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s}
.filter-btn.active{border-color:var(--green);color:var(--green);background:#0a1a0f}
.sort-select{margin-left:auto;padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--sub);font-size:.78rem;cursor:pointer;outline:none}

/* Homework item */
.hw-list{display:flex;flex-direction:column;gap:10px}
.hw-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;gap:14px;align-items:flex-start;transition:all .2s}
.hw-item:hover{border-color:#2a3a50}
.hw-item.done-item{opacity:.55}
.hw-item.done-item .hw-title{text-decoration:line-through;color:var(--dim)}
.hw-check{width:24px;height:24px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:2px;transition:all .2s}
.hw-check.checked{background:var(--green);border-color:var(--green)}
.hw-check svg{display:none}
.hw-check.checked svg{display:block}
.hw-body{flex:1;min-width:0}
.hw-title{font-weight:700;font-size:.95rem;margin-bottom:4px}
.hw-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
.hw-subject{font-size:.72rem;font-weight:700;padding:2px 10px;border-radius:20px;border:1px solid}
.hw-due{font-size:.72rem;color:var(--sub)}
.hw-due.overdue{color:var(--red);font-weight:700}
.hw-due.today{color:var(--yellow);font-weight:700}
.hw-due.tomorrow{color:var(--orange);font-weight:700}
.hw-priority{font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:20px}
.priority-high{background:#3f0f0f;color:var(--red);border:1px solid #6b1c1c}
.priority-med{background:#3a2000;color:var(--yellow);border:1px solid #6b3d00}
.priority-low{background:#0a1a0f;color:var(--green);border:1px solid #14532d}
.hw-notes{font-size:.8rem;color:var(--dim);margin-top:4px;white-space:pre-wrap}
.hw-actions{display:flex;gap:6px;margin-top:8px}
.hw-action-btn{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--sub);font-size:.72rem;cursor:pointer;transition:all .2s}
.hw-action-btn:hover{color:var(--text);border-color:var(--sub)}
.hw-action-btn.del:hover{color:var(--red);border-color:var(--red)}
.delete-btn{margin-left:auto;background:transparent;border:none;color:var(--dim);cursor:pointer;font-size:1.1rem;padding:2px 6px;transition:color .2s}
.delete-btn:hover{color:var(--red)}

/* Subject colours */
.subj-math{color:#60a5fa;border-color:#1e3a8a}
.subj-science{color:#34d399;border-color:#065f46}
.subj-english{color:#f472b6;border-color:#831843}
.subj-history{color:#fb923c;border-color:#7c2d12}
.subj-geography{color:#a78bfa;border-color:#4c1d95}
.subj-art{color:#f9a8d4;border-color:#9d174d}
.subj-pe{color:#fcd34d;border-color:#78350f}
.subj-other{color:var(--sub);border-color:var(--border)}

/* Empty state */
.empty{text-align:center;padding:48px 20px;color:var(--dim)}
.empty-icon{font-size:3rem;margin-bottom:12px}

/* Week view */
.week-view{display:none}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:20px}
.day-col{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px;min-height:80px}
.day-name{font-size:.68rem;font-weight:800;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.day-item{font-size:.7rem;background:#0a1428;border-radius:6px;padding:3px 6px;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.day-col.today-col{border-color:var(--green)}
.day-col.today-col .day-name{color:var(--green)}

/* Tabs */
.tab-bar{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{padding:10px 18px;background:transparent;border:none;color:var(--sub);font-weight:700;font-size:.88rem;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
</style>
</head>
<body>
<div id="stars"></div>
<nav>
  <a href="https://eppeok.github.io" class="nav-back">← All Tools</a>
  <div class="nav-title">📚 Homework Tracker</div>
</nav>
<div class="page">
  <h1>📚 Homework Tracker</h1>
  <p class="sub">Keep on top of every assignment. Never miss a deadline again.</p>

  <!-- Summary bar -->
  <div class="summary-bar">
    <div class="sum-card urgent"><div class="sum-num" id="sum-overdue">0</div><div class="sum-lbl">Overdue</div></div>
    <div class="sum-card due"><div class="sum-num" id="sum-due-soon">0</div><div class="sum-lbl">Due Soon</div></div>
    <div class="sum-card total"><div class="sum-num" id="sum-pending">0</div><div class="sum-lbl">Pending</div></div>
    <div class="sum-card done"><div class="sum-num" id="sum-done">0</div><div class="sum-lbl">Done</div></div>
  </div>

  <!-- Add form -->
  <div class="add-form">
    <div class="form-title">+ Add Assignment</div>
    <div class="form-grid">
      <div class="field full">
        <label>Assignment Title</label>
        <input type="text" id="hw-title" placeholder="e.g. Chapter 4 Questions"/>
      </div>
      <div class="field">
        <label>Subject</label>
        <select id="hw-subject">
          <option value="math">📐 Maths</option>
          <option value="science">🔬 Science</option>
          <option value="english">📖 English</option>
          <option value="history">🏛 History</option>
          <option value="geography">🌍 Geography</option>
          <option value="art">🎨 Art</option>
          <option value="pe">⚽ PE</option>
          <option value="other">📌 Other</option>
        </select>
      </div>
      <div class="field">
        <label>Due Date</label>
        <input type="date" id="hw-due"/>
      </div>
      <div class="field">
        <label>Priority</label>
        <select id="hw-priority">
          <option value="med">Medium</option>
          <option value="high">🔴 High</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
      <div class="field">
        <label>Estimated Time</label>
        <select id="hw-time">
          <option value="">—</option>
          <option value="15 min">15 min</option>
          <option value="30 min">30 min</option>
          <option value="45 min">45 min</option>
          <option value="1 hr">1 hour</option>
          <option value="1.5 hr">1.5 hours</option>
          <option value="2+ hr">2+ hours</option>
        </select>
      </div>
      <div class="field full">
        <label>Notes (optional)</label>
        <input type="text" id="hw-notes" placeholder="e.g. p.34-38, bring textbook"/>
      </div>
    </div>
    <button class="add-btn" onclick="addHomework()">Add Assignment</button>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('list',this)">📋 List</button>
    <button class="tab" onclick="switchTab('week',this)">📅 Week</button>
  </div>

  <!-- List view -->
  <div id="list-view">
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all" onclick="setFilter(this)">All</button>
      <button class="filter-btn" data-filter="pending" onclick="setFilter(this)">Pending</button>
      <button class="filter-btn" data-filter="overdue" onclick="setFilter(this)">Overdue</button>
      <button class="filter-btn" data-filter="today" onclick="setFilter(this)">Today</button>
      <button class="filter-btn" data-filter="done" onclick="setFilter(this)">Done</button>
      <select class="sort-select" id="sort-select" onchange="renderList()">
        <option value="due">Sort: Due Date</option>
        <option value="priority">Sort: Priority</option>
        <option value="subject">Sort: Subject</option>
        <option value="added">Sort: Added</option>
      </select>
    </div>
    <div class="hw-list" id="hw-list"></div>
  </div>

  <!-- Week view -->
  <div id="week-view" class="week-view">
    <div class="week-grid" id="week-grid"></div>
  </div>
</div>

<script>
(()=>{const c=document.getElementById('stars');for(let i=0;i<60;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2+1;s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s;opacity:.3`;c.appendChild(s);}})();

// set default due date to tomorrow
const tomorrow=new Date();tomorrow.setDate(tomorrow.getDate()+1);
document.getElementById('hw-due').value=tomorrow.toISOString().split('T')[0];

let homeworks=[], currentFilter='all', currentTab='list';

function load(){
  try{homeworks=JSON.parse(localStorage.getItem('hw_list')||'[]');}catch{homeworks=[];}
}
function save(){
  try{localStorage.setItem('hw_list',JSON.stringify(homeworks));}catch{}
}
function today(){return new Date().toISOString().split('T')[0];}
function daysDiff(dateStr){
  if(!dateStr) return 9999;
  const d=new Date(dateStr+'T00:00:00');
  const t=new Date();t.setHours(0,0,0,0);
  return Math.round((d-t)/(1000*60*60*24));
}

function addHomework(){
  const title=document.getElementById('hw-title').value.trim();
  if(!title){document.getElementById('hw-title').focus();return;}
  const hw={
    id:Date.now(),
    title,
    subject:document.getElementById('hw-subject').value,
    due:document.getElementById('hw-due').value,
    priority:document.getElementById('hw-priority').value,
    time:document.getElementById('hw-time').value,
    notes:document.getElementById('hw-notes').value.trim(),
    done:false,
    addedAt:Date.now()
  };
  homeworks.unshift(hw);
  save();
  document.getElementById('hw-title').value='';
  document.getElementById('hw-notes').value='';
  renderAll();
}

function toggleDone(id){
  const hw=homeworks.find(h=>h.id===id);
  if(hw){hw.done=!hw.done; save(); renderAll();}
}

function deleteHW(id){
  homeworks=homeworks.filter(h=>h.id!==id);
  save(); renderAll();
}

function setFilter(el){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  currentFilter=el.dataset.filter;
  renderList();
}

function switchTab(tab, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  currentTab=tab;
  document.getElementById('list-view').style.display=tab==='list'?'block':'none';
  document.getElementById('week-view').style.display=tab==='week'?'block':'none';
  if(tab==='week') renderWeek();
}

const subjLabel={math:'📐 Maths',science:'🔬 Science',english:'📖 English',history:'🏛 History',geography:'🌍 Geography',art:'🎨 Art',pe:'⚽ PE',other:'📌 Other'};
const priLabel={high:'High',med:'Medium',low:'Low'};
const priOrder={high:0,med:1,low:2};

function getFiltered(){
  const todayStr=today();
  return homeworks.filter(hw=>{
    if(currentFilter==='pending') return !hw.done;
    if(currentFilter==='done') return hw.done;
    if(currentFilter==='overdue') return !hw.done && hw.due && hw.due<todayStr;
    if(currentFilter==='today') return hw.due===todayStr;
    return true;
  });
}

function getSorted(list){
  const sort=document.getElementById('sort-select').value;
  return [...list].sort((a,b)=>{
    if(sort==='priority') return priOrder[a.priority]-priOrder[b.priority];
    if(sort==='subject') return a.subject.localeCompare(b.subject);
    if(sort==='added') return b.addedAt-a.addedAt;
    // due — undated last
    if(!a.due&&!b.due) return 0;
    if(!a.due) return 1;
    if(!b.due) return -1;
    return a.due.localeCompare(b.due);
  });
}

function dueLabel(dateStr, done){
  if(!dateStr) return '';
  const d=daysDiff(dateStr);
  const fmt=new Date(dateStr+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  if(done) return `<span class="hw-due">Due ${fmt}</span>`;
  if(d<0) return `<span class="hw-due overdue">⚠ Overdue (${fmt})</span>`;
  if(d===0) return `<span class="hw-due today">🔔 Due Today</span>`;
  if(d===1) return `<span class="hw-due tomorrow">⏰ Due Tomorrow</span>`;
  return `<span class="hw-due">Due ${fmt}</span>`;
}

function renderList(){
  const list=getSorted(getFiltered());
  const container=document.getElementById('hw-list');
  if(!list.length){
    container.innerHTML=`<div class="empty"><div class="empty-icon">🎉</div><div>${currentFilter==='done'?'No completed tasks yet.':currentFilter==='overdue'?'No overdue tasks!':'Nothing here yet. Add your first assignment above!'}</div></div>`;
    return;
  }
  container.innerHTML=list.map(hw=>`
    <div class="hw-item${hw.done?' done-item':''}" id="hwitem-${hw.id}">
      <div class="hw-check${hw.done?' checked':''}" onclick="toggleDone(${hw.id})">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="2,7 6,11 12,3" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="hw-body">
        <div class="hw-title">${escHtml(hw.title)}</div>
        <div class="hw-meta">
          <span class="hw-subject subj-${hw.subject}">${subjLabel[hw.subject]||hw.subject}</span>
          ${dueLabel(hw.due, hw.done)}
          <span class="hw-priority priority-${hw.priority}">${priLabel[hw.priority]}</span>
          ${hw.time?`<span style="font-size:.7rem;color:var(--dim)">⏱ ${hw.time}</span>`:''}
        </div>
        ${hw.notes?`<div class="hw-notes">${escHtml(hw.notes)}</div>`:''}
      </div>
      <button class="delete-btn" onclick="deleteHW(${hw.id})" title="Delete">✕</button>
    </div>`).join('');
}

function renderSummary(){
  const todayStr=today();
  let overdue=0, dueSoon=0, pending=0, done=0;
  homeworks.forEach(hw=>{
    if(hw.done){done++;return;}
    pending++;
    if(!hw.due) return;
    const d=daysDiff(hw.due);
    if(d<0) overdue++;
    else if(d<=2) dueSoon++;
  });
  document.getElementById('sum-overdue').textContent=overdue;
  document.getElementById('sum-due-soon').textContent=dueSoon;
  document.getElementById('sum-pending').textContent=pending;
  document.getElementById('sum-done').textContent=done;
}

function renderWeek(){
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const todayStr=today();
  const todayDate=new Date();
  const dayOfWeek=todayDate.getDay(); // 0=Sun
  const monday=new Date(todayDate);
  monday.setDate(todayDate.getDate()-((dayOfWeek+6)%7));
  const grid=document.getElementById('week-grid');
  grid.innerHTML=days.map((d,i)=>{
    const dt=new Date(monday);dt.setDate(monday.getDate()+i);
    const dtStr=dt.toISOString().split('T')[0];
    const isToday=dtStr===todayStr;
    const items=homeworks.filter(hw=>hw.due===dtStr&&!hw.done);
    return `<div class="day-col${isToday?' today-col':''}">
      <div class="day-name">${d} ${dt.getDate()}</div>
      ${items.map(hw=>`<div class="day-item" title="${escHtml(hw.title)}">${escHtml(hw.title)}</div>`).join('')}
      ${!items.length?`<div style="font-size:.65rem;color:var(--dim)">Free</div>`:''}
    </div>`;
  }).join('');
}

function renderAll(){
  renderSummary();
  if(currentTab==='list') renderList();
  else renderWeek();
}

function escHtml(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

load();
renderAll();
</script>
</body>
</html>
